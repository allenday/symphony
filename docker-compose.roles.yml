services:
  symphony-builder:
    build:
      context: .
      dockerfile: elixir/docker/Dockerfile
    env_file:
      - .env.builder
    environment:
      SYMPHONY_WORKFLOW_FILE: /opt/symphony/elixir/WORKFLOW.docker.gitea.builder.md
    ports:
      - "4000:4000"
    volumes:
      - ${HOME}/.codex/auth.json:/root/.codex/auth.json:ro
      - symphony-builder-workspaces:/workspaces
      - symphony-builder-logs:/var/log/symphony

  symphony-reviewer:
    build:
      context: .
      dockerfile: elixir/docker/Dockerfile
    env_file:
      - .env.reviewer
    environment:
      SYMPHONY_WORKFLOW_FILE: /opt/symphony/elixir/WORKFLOW.docker.gitea.reviewer.md
    volumes:
      - ${HOME}/.codex/auth.json:/root/.codex/auth.json:ro
      - symphony-reviewer-workspaces:/workspaces
      - symphony-reviewer-logs:/var/log/symphony

  symphony-triage:
    build:
      context: .
      dockerfile: elixir/docker/Dockerfile
    env_file:
      - .env.triage
    environment:
      SYMPHONY_WORKFLOW_FILE: /opt/symphony/elixir/WORKFLOW.docker.gitea.triage.md
    volumes:
      - ${HOME}/.codex/auth.json:/root/.codex/auth.json:ro
      - symphony-triage-workspaces:/workspaces
      - symphony-triage-logs:/var/log/symphony

  symphony-controller:
    build:
      context: .
      dockerfile: elixir/docker/Dockerfile
    env_file:
      - .env.controller
    environment:
      SYMPHONY_WORKFLOW_FILE: /opt/symphony/elixir/WORKFLOW.docker.gitea.controller.md
    volumes:
      - ${HOME}/.codex/auth.json:/root/.codex/auth.json:ro
      - symphony-controller-workspaces:/workspaces
      - symphony-controller-logs:/var/log/symphony

volumes:
  symphony-builder-workspaces:
  symphony-builder-logs:
  symphony-reviewer-workspaces:
  symphony-reviewer-logs:
  symphony-triage-workspaces:
  symphony-triage-logs:
  symphony-controller-workspaces:
  symphony-controller-logs:
